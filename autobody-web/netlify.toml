# Netlify deployment config for autobody-web (Next.js 14 App Router).
# The Next.js runtime plugin handles SSR + image optimisation automatically.

[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  # Default site URL used by metadataBase. Override in Netlify UI for the
  # canonical production deploy URL once the project is renamed.
  NEXT_PUBLIC_SITE_URL = "https://ferreiras-autobody.netlify.app"
  # Disable telemetry on the build.
  NEXT_TELEMETRY_DISABLED = "1"

# Long-cache static assets, never cache HTML.
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
