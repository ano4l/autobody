# Integration-test profile — used by AbstractPostgresIntegrationTest.
# Testcontainers overrides the datasource URL via @DynamicPropertySource.

# ── Flyway (against the throwaway Postgres container) ────────
spring.flyway.enabled=true
spring.flyway.clean-disabled=false

# ── JPA ──────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── JWT (dummy 32-byte secret just so SecurityConfig wires) ──
app.jwt.secret=integration-test-secret-integration-test-secret-32
app.jwt.expiration-ms=3600000
app.jwt.refresh-expiration-ms=7200000
app.jwt.issuer=autobody-it
app.cors.allowed-origins=http://localhost:3000

# ── Redis — stubbed; tests MockBean anything that touches it ─
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.url=redis://localhost:6379
spring.data.redis.client-type=lettuce
spring.data.redis.lettuce.shutdown-timeout=0ms
spring.cache.type=none

# ── Quartz — disable auto-start; tests exercise services directly
spring.quartz.auto-startup=false
spring.quartz.job-store-type=memory

# ── WhatsApp / Meta — empty so WhatsAppClient no-ops ─────────
meta.whatsapp.token=
meta.whatsapp.phone-number-id=
meta.whatsapp.verify-token=test-verify
meta.whatsapp.app-secret=
meta.whatsapp.state-ttl-minutes=30
meta.whatsapp.timeout-minutes=30
meta.whatsapp.timeout-cron=0 0 0 1 1 ? 2099

# ── Shopify — disabled ───────────────────────────────────────
shopify.store-domain=
shopify.admin-api-token=
shopify.webhook-secret=
shopify.sync-enabled=false
shopify.sync-cron=0 0 0 1 1 ? 2099

# ── Misc ─────────────────────────────────────────────────────
logging.level.org.hibernate.SQL=WARN
logging.level.com.autobody=INFO
