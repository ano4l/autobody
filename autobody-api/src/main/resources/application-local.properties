# Local development overrides.
# docker-compose up brings Postgres on 5432 and Redis on 6379.

spring.datasource.url=jdbc:postgresql://localhost:5432/autobody
spring.datasource.username=autobody
spring.datasource.password=autobody_local

spring.data.redis.url=redis://localhost:6379

app.jwt.secret=local-dev-secret-change-me-to-a-256-bit-random-string-for-production-use-only
app.cors.allowed-origins=http://localhost:3000,http://localhost:3001

spring.jpa.show-sql=true
logging.level.com.autobody=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# Keep seeded WhatsApp demo threads active for walkthroughs in local environments.
meta.whatsapp.timeout-minutes=10080
