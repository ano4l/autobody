version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: autobody-postgres
    environment:
      POSTGRES_DB: autobody
      POSTGRES_USER: autobody
      POSTGRES_PASSWORD: autobody_local
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autobody -d autobody"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: autobody-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pg_data:
