# ── Profile ──────────────────────────────────────────────────
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# ── Server ──────────────────────────────────────────────────
server.port=${SERVER_PORT:8080}
spring.application.name=autobody-api

# ── JPA / Hibernate ──────────────────────────────────────────
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ── Flyway ───────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ── Datasource ───────────────────────────────────────────────
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000

# ── Security / JWT ───────────────────────────────────────────
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
app.jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:604800000}
app.jwt.issuer=autobody-api

# ── CORS ─────────────────────────────────────────────────────
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000}

# ── Redis ────────────────────────────────────────────────────
spring.data.redis.url=${REDIS_URL}
spring.cache.type=redis
spring.cache.redis.time-to-live=3600000

# ── Async / Thread pool ──────────────────────────────────────
spring.task.execution.pool.core-size=5
spring.task.execution.pool.max-size=20
spring.task.execution.pool.queue-capacity=100
spring.task.execution.thread-name-prefix=autobody-async-

# ── Tomcat ───────────────────────────────────────────────────
server.tomcat.max-threads=50
server.tomcat.accept-count=100

# ── Meta / WhatsApp ──────────────────────────────────────────
meta.whatsapp.token=${META_ACCESS_TOKEN:}
meta.whatsapp.phone-number-id=${META_PHONE_NUMBER_ID:}
meta.whatsapp.verify-token=${META_VERIFY_TOKEN:}
meta.whatsapp.api-url=https://graph.facebook.com/v19.0
meta.whatsapp.app-secret=${META_APP_SECRET:}
meta.whatsapp.state-ttl-minutes=${META_STATE_TTL_MINUTES:30}

# ── Shopify ──────────────────────────────────────────────────
shopify.store-domain=${SHOPIFY_STORE_DOMAIN:}
shopify.admin-api-token=${SHOPIFY_ADMIN_TOKEN:}
shopify.webhook-secret=${SHOPIFY_WEBHOOK_SECRET:}
shopify.api-version=${SHOPIFY_API_VERSION:2026-01}
shopify.sync-enabled=${SHOPIFY_SYNC_ENABLED:false}
shopify.sync-cron=${SHOPIFY_SYNC_CRON:0 0/15 * * * ?}

# POSibolt source-of-truth sync
posibolt.base-url=${POSIBOLT_BASE_URL:}
posibolt.api-token=${POSIBOLT_API_TOKEN:}
posibolt.products-path=${POSIBOLT_PRODUCTS_PATH:/api/v1/products}
posibolt.stock-path=${POSIBOLT_STOCK_PATH:/api/v1/stock}
posibolt.orders-path=${POSIBOLT_ORDERS_PATH:/api/v1/orders}
posibolt.sync-enabled=${POSIBOLT_SYNC_ENABLED:false}
posibolt.sync-cron=${POSIBOLT_SYNC_CRON:0 0/5 * * * ?}

# ── Resend (email) ───────────────────────────────────────────
resend.api-key=${RESEND_API_KEY:}
resend.from=${RESEND_FROM:noreply@yourdomain.com}

# ── Supabase Storage ─────────────────────────────────────────
supabase.url=${SUPABASE_URL:}
supabase.anon-key=${SUPABASE_ANON_KEY:}
supabase.service-role-key=${SUPABASE_SERVICE_ROLE_KEY:}
supabase.storage.bucket=${SUPABASE_STORAGE_BUCKET:autobody-media}

# ── SpringDoc / Swagger ──────────────────────────────────────
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha

# ── Logging ──────────────────────────────────────────────────
logging.level.root=INFO
logging.level.com.autobody=DEBUG
logging.level.org.springframework.security=INFO
logging.pattern.console=%clr(%d{yyyy-MM-dd HH:mm:ss.SSS}){faint} %clr(%5p) %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} : %m%n%wEx

# ── Actuator ─────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
